<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>claude-frugal-agents | demo form</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 8px; }
    fieldset { margin-bottom: 24px; padding: 16px; border: 1px solid #ccc; border-radius: 6px; }
    legend { padding: 0 6px; font-weight: 600; color: #333; }
    label { display: block; margin: 10px 0 4px; font-weight: 500; }
    input, select, textarea { width: 100%; padding: 8px; font-size: 14px; box-sizing: border-box; }
    textarea { min-height: 80px; font-family: inherit; }
    button { padding: 10px 20px; background: #1f6feb; color: white; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; }
    button:hover { background: #0056d3; }
    #result { margin-top: 16px; padding: 12px; background: #e8f5e9; border-radius: 6px; display: none; }
  </style>
</head>
<body>
  <h1>Demo form</h1>
  <p>A local form used by <code>examples/form_filler_demo/run_demo.py</code>
     to exercise every pattern in <a href="../../README.md">claude-frugal-agents</a>.
     Submits to a local handler -- no network.</p>

  <form id="demo-form">
    <fieldset>
      <legend>Identity</legend>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>
    </fieldset>

    <fieldset>
      <legend>Experience</legend>
      <label for="years">Years of relevant experience</label>
      <select id="years" name="years" required>
        <option value="">Select one...</option>
        <option>Under 1 year</option>
        <option>1-3 years</option>
        <option>3-5 years</option>
        <option>5+ years</option>
      </select>
      <label for="why">Why do you want this role?</label>
      <textarea id="why" name="why" placeholder="A sentence or two"></textarea>
    </fieldset>

    <button type="submit" id="submit-btn">Submit</button>
    <div id="result"></div>
  </form>

  <script>
    document.getElementById("demo-form").addEventListener("submit", (ev) => {
      ev.preventDefault();
      const data = {};
      new FormData(ev.target).forEach((v, k) => data[k] = v);
      // Persist to localStorage so the driver can verify.
      window.__LAST_SUBMISSION__ = data;
      const box = document.getElementById("result");
      box.style.display = "block";
      box.textContent = "SUBMITTED: " + JSON.stringify(data);
    });
  </script>
</body>
</html>
